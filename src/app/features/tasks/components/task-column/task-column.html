<div
  class="column"
  [ngClass]="{
    'todo-header': title() === 'To Do',
    'progress-header': title() === 'In Progress',
    'done-header': title() === 'Done'
  }"
  cdkDropList
  [id]="listId()"
  [cdkDropListData]="tasks()"
  [cdkDropListConnectedTo]="connectedTo()"
  (cdkDropListDropped)="dropFn()($event)"
>
  <div class="column-header">
    <span class="column-title">
      {{ title() }}
    </span>

    <span class="task-count">
      {{ tasks().length }}
    </span>
  </div>

  @if (tasks().length === 0) {
    <div class="emptyList">Sin tareas</div>
  }

  @for (task of tasks(); track task.id) {
    <div cdkDrag (cdkDragStarted)="onDragStart()()" (cdkDragEnded)="onDragEnd()()">
      <app-task-card [task]="task" (delete)="deleteFn()(task, tasks())" (update)="updateFn()($event)">
      </app-task-card>
    </div>
  }
</div>
