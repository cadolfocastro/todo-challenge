<h2 mat-dialog-title>Nueva tarea</h2>

<mat-dialog-content>

<div class="form-group">
<label>Título</label>
<input [(ngModel)]="task.title" required #title="ngModel">

@if(title.invalid && title.touched){
  <span class="error">El título es obligatorio</span>
}
</div>

<div class="form-group">
<label>Descripción</label>
<textarea [(ngModel)]="task.description"></textarea>
</div>

<div class="form-group">
<label>Prioridad</label>
<select [(ngModel)]="task.priority">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>
</div>


<div class="form-group">
<label>Columna inicial</label>
<select [(ngModel)]="task.status">
<option value="todo">To Do</option>
<option value="inProgress">In Progress</option>
<option value="done">Done</option>
</select>
</div>

</mat-dialog-content>

<mat-dialog-actions align="end">

<button mat-button mat-dialog-close>
Cancelar
</button>

<button
mat-raised-button
color="primary"
(click)="save()"
[disabled]="title.invalid">
Crear tarea
</button>

</mat-dialog-actions>
