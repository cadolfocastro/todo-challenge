<h2 mat-dialog-title class="modal-title">{{ isEdit ? 'Editar tarea' : 'Nueva tarea' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="modal-form">

    <div class="form-group">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Título</mat-label>
        <input matInput formControlName="title" placeholder="Nombre de la tarea" />
        <mat-error>El título es obligatorio</mat-error>
      </mat-form-field>
    </div>

    <div class="form-group">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Descripción</mat-label>
        <textarea
          matInput
          formControlName="description"
          placeholder="Descripción opcional"
          rows="3"
        ></textarea>
      </mat-form-field>
    </div>

    <div class="form-group">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Prioridad</mat-label>
        <mat-select formControlName="priority">
          <mat-option value="Baja">Baja</mat-option>
          <mat-option value="Media">Media</mat-option>
          <mat-option value="Alta">Alta</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    @if (!isEdit) {
      <div class="form-group">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Columna inicial</mat-label>
          <mat-select formControlName="status">
            <mat-option value="todo">To Do</mat-option>
            <mat-option value="inProgress">In Progress</mat-option>
            <mat-option value="done">Done</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    }

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-flat-button color="primary" (click)="save()" [disabled]="form.invalid">
    {{ isEdit ? 'Guardar' : 'Crear' }}
  </button>
</mat-dialog-actions>
