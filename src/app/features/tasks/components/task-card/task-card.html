@if (task) {
  <div class="task">
    <button class="delete-btn" (click)="deleteTask()">X</button>
    <h3 (click) = 'openEditModal()' class = 'task-title'>
      {{ task.title }}
    </h3>
    <p>{{ task.description }}</p>
    <p>Prioridad: {{ task.priority }}</p>
    <small> Creada: {{ task.createdAt | date: 'short' }} </small>
  </div>
}
