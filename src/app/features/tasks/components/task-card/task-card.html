@if (task) {
  <div class="task">
    <button class="delete-btn" (click)="deleteTask()">×</button>
    <h3 (click)='openEditModal()' class='task-title'>
      {{ task.title }}
    </h3>
    <p class="description">{{ task.description }}</p>
    <p class="priority priority-{{ task.priority.toLowerCase() }}">{{ task.priority }}</p>
    <small class="date">Creada: {{ task.createdAt | date: 'short' }}</small>
  </div>
}
