<div class="board">
  <app-task-column
    listId="todoList"
    title="To Do"
    [tasks]="taskService.todo"
    [connectedTo]="['inProgressList', 'doneList']"
    [dropFn]="drop.bind(this)"
    [deleteFn]="deleteTask.bind(this)"
    [updateFn]="updateTask.bind(this)"
  >
  </app-task-column>

  <app-task-column
    listId="inProgressList"
    title="In Progress"
    [tasks]="taskService.inProgress"
    [connectedTo]="['todoList', 'doneList']"
    [dropFn]="drop.bind(this)"
    [deleteFn]="deleteTask.bind(this)"
    [updateFn]="updateTask.bind(this)"
  >
  </app-task-column>

  <app-task-column
    listId="doneList"
    title="Done"
    [tasks]="taskService.done"
    [connectedTo]="['todoList', 'inProgressList']"
    [dropFn]="drop.bind(this)"
    [deleteFn]="deleteTask.bind(this)"
    [updateFn]="updateTask.bind(this)"
  >
  </app-task-column>
</div>
<div class = 'create-task-container'>
  <button class="create-task-btn" (click)="openCreateTaskModal()">+ Nueva tarea</button>
</div>
